name: Build and Package ZIP

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# 设置环境变量以适配最新的 Node.js 24 运行时
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # 直接使用最新的 Node 24 避免弃用警告
          # 注意：删除了 cache: 'npm'，因为你的仓库里没有提交 package-lock.json

      - name: Install dependencies
        # 如果没有 lock 文件，建议直接运行 npm install
        run: npm install

      - name: Build project
        run: npm run build

      - name: Zip build output
        # 确保 zip 命令在构建成功后执行
        run: |
          if [ -d "dist" ]; then
            zip -r build_package.zip dist/
          elif [ -d "build" ]; then
            zip -r build_package.zip build/
          else
            echo "Error: Build output folder not found."
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EZ_THEME_Build
          path: build_package.zip
