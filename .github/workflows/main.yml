name: Build and Package ZIP

# 触发条件：当推送到 main 分支时执行（你可以根据需要修改分支名）
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # 你可以根据项目要求调整版本
          cache: 'npm'

      # 3. 安装项目依赖
      - name: Install dependencies
        run: npm install

      # 4. 执行生产环境构建
      - name: Build project
        run: npm run build

      # 5. 将构建产物压缩成 ZIP
      # 假设构建后的文件夹名为 dist，你可以根据实际情况修改
      - name: Zip build output
        run: zip -r build_package.zip dist/

      # 6. 上传 ZIP 文件作为 Artifact
      # 这样你就可以在 GitHub Actions 的运行页面下载它
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EZ_THEME_Build
          path: build_package.zip
