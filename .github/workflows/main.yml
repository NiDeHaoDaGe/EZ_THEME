name: 自动构建与部署

on:
  push:
    branches: [ "main" ] # 监听 main 分支的提交

jobs:
  build:
    runs-on: ubuntu-latest # 使用 GitHub 提供的 Linux 服务器

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: 安装依赖
      run: npm install

    - name: 执行构建
      run: npm run build || true
